name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run tests
        run: python -m pytest

      - name: Run ruff
        run: python -m ruff check .

      - name: Run adversarial rule-agent eval
        run: python -m packages.eval_observatory.eval_runner --suite adversarial --agent rule
